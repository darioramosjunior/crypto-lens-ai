# Crypto-Lens Configuration File
# This file stores paths and scheduling configurations for the application
# Format: Standard INI with [section] key=value pairs

[paths]
log_path=/var/log/crypto-lens/
output_path=/var/run/crypto-lens/

[schedules]
main_cron_sched=*/5 * * * *
logs_cleaner_cron_sched=0 15 * * *
